name: Generate Keystore (run once then delete)
on: workflow_dispatch
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias pdf-reader-pro \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -dname "CN=PDF Reader Pro, O=PDFReaderPro, C=US" \
            -storepass MySecurePass2024 \
            -keypass MySecurePass2024
          echo ""
          echo "========== COPY EVERYTHING BELOW =========="
          base64 -w 0 release.keystore
          echo ""
          echo "========== END =========="

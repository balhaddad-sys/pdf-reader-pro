<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="description" content="Professional PDF reader, annotator, and document manager. Read, highlight, annotate, and organize your PDFs with a beautiful, privacy-first experience." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <style>
      @font-face {
        font-family: 'Inter';
        font-style: normal;
        font-weight: 100 900;
        font-display: swap;
        src: url('/fonts/inter-var.woff2') format('woff2');
      }
    </style>
    <title>PDF Reader Pro</title>
  <script>
    // Auto-reload when a new service worker takes control (web PWA only).
    // Skip inside Capacitor — the APK already ships the latest assets.
    var isCapacitor = window.location.protocol === 'capacitor:'
      || navigator.userAgent.includes('wv')
      || window.hasOwnProperty('Capacitor');
    if (!isCapacitor && 'serviceWorker' in navigator) {
      var prevController = navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (prevController) window.location.reload();
        prevController = navigator.serviceWorker.controller;
      });
    }
  </script>
  </head>
  <body class="bg-surface-0 text-on-surface antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
